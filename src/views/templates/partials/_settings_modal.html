    <!-- ── Settings modal ────────────────────────────────────────── -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closeSettings()"></div>
        <div class="modal-dialog">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="btn-icon" onclick="closeSettings()" title="Close">&times;</button>
            </div>
            <div class="modal-tabs">
                <button class="tab active" data-tab="tab-api" onclick="switchTab(this)">API &amp; Models</button>
                <button class="tab" data-tab="tab-prompt" onclick="switchTab(this)">System Prompt</button>
                <button class="tab" data-tab="tab-dirs" onclick="switchTab(this)">Data Directories</button>
                <button class="tab" data-tab="tab-params" onclick="switchTab(this)">Clustering</button>
                <button class="tab" data-tab="tab-comfyui" onclick="switchTab(this)">ComfyUI</button>
                <button class="tab" data-tab="tab-look" onclick="switchTab(this)">Look &amp; Feel</button>
            </div>
            <div class="modal-body">
                <!-- API & Models tab -->
                <div id="tab-api" class="tab-pane active">
                    <label>Gemini API Key
                        <div class="input-group">
                            <input type="password" id="setting-api-key" placeholder="Enter your API key">
                            <button class="btn-sm" onclick="toggleApiKeyVisibility()">Show</button>
                        </div>
                        <span id="api-key-status" class="hint"></span>
                    </label>
                    <label>Agent Model
                        <input type="text" id="setting-model-agent" placeholder="gemini-3-pro-preview">
                    </label>
                    <label>Embedding Model
                        <input type="text" id="setting-model-embedding" placeholder="gemini-embedding-001">
                    </label>
                    <label>Summary Model
                        <input type="text" id="setting-model-summary" placeholder="gemini-2.5-flash-lite">
                    </label>
                    <label>Rate Limit (requests per minute)
                        <input type="number" id="setting-rate-limit" placeholder="3000" min="0" step="1">
                        <span class="hint">Max Gemini API requests per minute. Set to 0 to disable. Default: 3000.</span>
                    </label>
                    <div class="btn-row">
                        <button class="btn-primary" onclick="saveApiSettings()">Save</button>
                    </div>
                </div>

                <!-- System Prompt tab -->
                <div id="tab-prompt" class="tab-pane hidden">
                    <label>System Prompt
                        <textarea id="setting-system-prompt" rows="16" placeholder="System prompt..."></textarea>
                    </label>
                    <div class="btn-row">
                        <button class="btn-secondary" onclick="resetSystemPrompt()">Reset to Default</button>
                        <button class="btn-primary" onclick="saveSystemPrompt()">Save</button>
                    </div>
                </div>

                <!-- Data Directories tab -->
                <div id="tab-dirs" class="tab-pane hidden">
                    <div id="dir-list" class="dir-list"></div>
                    <div class="add-dir-form">
                        <h4>Add Directory</h4>
                        <label>Path
                            <input type="text" id="new-dir-path" placeholder="/path/to/data">
                        </label>
                        <label>Type
                            <select id="new-dir-type">
                                <option value="training">Training</option>
                                <option value="output">Output</option>
                            </select>
                        </label>
                        <div class="btn-row">
                            <button class="btn-primary" onclick="addDirectory()">Add</button>
                        </div>
                    </div>
                    <hr>
                    <div class="btn-row">
                        <button class="btn-secondary" onclick="triggerIngestion()">Re-index All</button>
                        <button class="btn-primary" onclick="refreshOutput()">Refresh Output Folders</button>
                    </div>
                </div>

                <!-- ComfyUI tab -->
                <div id="tab-comfyui" class="tab-pane hidden">
                    <div class="comfyui-connection-status">
                        <span id="comfyui-status-dot" class="status-dot offline"></span>
                        <span id="comfyui-status-text">Not connected</span>
                    </div>

                    <label>ComfyUI Base URL
                        <div class="input-group">
                            <input type="text" id="setting-comfyui-url" placeholder="http://localhost:8188">
                            <button class="btn-sm" onclick="testComfyUIConnection()">Test</button>
                        </div>
                    </label>

                    <label>Default Base Model
                        <div id="comfyui-model-dropdown"></div>
                        <span class="hint">Select from available diffusion models</span>
                    </label>

                    <label>Default Negative Prompt
                        <textarea id="setting-comfyui-negative" rows="4" placeholder="Default negative prompt..."></textarea>
                    </label>

                    <label>Default Sampler
                        <input type="text" id="setting-comfyui-sampler" placeholder="e.g. euler, dpmpp_2m">
                    </label>

                    <label>Default CFG Scale
                        <input type="number" id="setting-comfyui-cfg" step="0.5" min="0" placeholder="e.g. 7.0">
                    </label>

                    <label>Default Scheduler
                        <input type="text" id="setting-comfyui-scheduler" placeholder="e.g. normal, karras">
                    </label>

                    <label>Default Steps
                        <input type="number" id="setting-comfyui-steps" min="1" step="1" placeholder="e.g. 20">
                    </label>

                    <label>API Workflow JSON
                        <div class="workflow-upload-area">
                            <span id="workflow-api-filename" class="workflow-filename">No API workflow uploaded</span>
                            <div class="input-group">
                                <input type="file" id="workflow-api-file-input" accept=".json" class="hidden">
                                <button class="btn-sm" onclick="document.getElementById('workflow-api-file-input').click()">Browse…</button>
                                <button class="btn-sm btn-danger" id="workflow-api-delete-btn" onclick="deleteUploadedWorkflow()" style="display:none">Remove</button>
                            </div>
                        </div>
                        <span id="workflow-api-status" class="hint">Export via "Save (API Format)" in ComfyUI — required for generation</span>
                    </label>

                    <label>UI Workflow JSON <span class="hint" style="display:inline">(optional)</span>
                        <div class="workflow-upload-area">
                            <span id="workflow-ui-filename" class="workflow-filename">No UI workflow uploaded</span>
                            <div class="input-group">
                                <input type="file" id="workflow-ui-file-input" accept=".json" class="hidden">
                                <button class="btn-sm" onclick="document.getElementById('workflow-ui-file-input').click()">Browse…</button>
                                <button class="btn-sm btn-danger" id="workflow-ui-delete-btn" onclick="deleteUploadedWorkflow()" style="display:none">Remove</button>
                            </div>
                        </div>
                        <span id="workflow-ui-status" class="hint">Export via regular "Save" in ComfyUI — used for image metadata</span>
                    </label>

                    <div class="btn-row">
                        <button class="btn-primary" onclick="saveComfyUISettings()">Save</button>
                    </div>
                </div>

                <!-- Look & Feel tab -->
                <div id="tab-look" class="tab-pane hidden">
                    <label>Chat Thumbnails
                        <select id="setting-thumb-chat">
                            <option value="small">Small</option>
                            <option value="medium">Medium</option>
                            <option value="large">Large</option>
                        </select>
                        <span class="setting-help">Size of image thumbnails in chat messages</span>
                    </label>

                    <label>Browser Thumbnails
                        <select id="setting-thumb-browser">
                            <option value="small">Small</option>
                            <option value="medium">Medium</option>
                            <option value="large">Large</option>
                        </select>
                        <span class="setting-help">Size of image thumbnails in the browser grid</span>
                    </label>

                    <div class="btn-row">
                        <button class="btn-primary" onclick="saveLookFeelSettings()">Save</button>
                    </div>
                </div>

                <!-- Clustering tab -->
                <div id="tab-params" class="tab-pane hidden">
                    <h3 class="settings-group-title">Query Parameters</h3>
                    <p class="settings-group-desc">Controls how many results the agent retrieves when searching the dataset.</p>

                    <label>Similar Search Results (k)
                        <input type="number" id="setting-query-k-similar" min="1" max="50" step="1">
                        <span class="setting-help">Number of results returned by search_similar and search_diverse tools</span>
                    </label>

                    <label>Themed Prompts — Intra-folder (k)
                        <input type="number" id="setting-query-k-theme-intra" min="1" max="20" step="1">
                        <span class="setting-help">Results per folder when querying themed prompts within folders</span>
                    </label>

                    <label>Themed Prompts — Cross-folder (k)
                        <input type="number" id="setting-query-k-theme-cross" min="1" max="20" step="1">
                        <span class="setting-help">Results for cross-folder themed prompt queries</span>
                    </label>

                    <label>Random Prompts (k)
                        <input type="number" id="setting-query-k-random" min="1" max="20" step="1">
                        <span class="setting-help">Number of random prompts returned by get_random tool</span>
                    </label>

                    <h3 class="settings-group-title">Clustering Parameters</h3>
                    <p class="settings-group-desc">Controls how the dataset is organized into thematic clusters. Changes take effect on next clustering run.</p>

                    <label>Clusters per Folder (k)
                        <input type="number" id="setting-cluster-k-intra" min="2" max="30" step="1">
                        <span class="setting-help">Number of theme clusters generated within each folder</span>
                    </label>

                    <label>Cross-folder Clusters (k)
                        <input type="number" id="setting-cluster-k-cross" min="2" max="50" step="1">
                        <span class="setting-help">Number of theme clusters generated across all folders</span>
                    </label>

                    <label>Minimum Folder Size
                        <input type="number" id="setting-cluster-min-folder-size" min="5" max="100" step="1">
                        <span class="setting-help">Folders with fewer documents than this won't be clustered</span>
                    </label>

                    <label>Cluster Label Terms
                        <input type="number" id="setting-cluster-label-terms" min="1" max="10" step="1">
                        <span class="setting-help">Number of TF-IDF terms used to generate cluster descriptions</span>
                    </label>

                    <div class="btn-row">
                        <button class="btn-primary" onclick="saveParamSettings()">Save Parameters</button>
                        <button class="btn-secondary" onclick="triggerClustering()">Re-cluster Now</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
